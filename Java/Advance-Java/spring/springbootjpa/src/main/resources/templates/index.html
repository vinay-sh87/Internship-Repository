<html xmlns:th="http://www.thymeleaf.org">
<head>

</head>
<body>
	<table width="70%" border="1">
		<thead>
			<tr>
				<th>ID</th>
				<th>NAME</th>
			</tr>
		</thead>
		<tbody>
			<tr th:each="user : ${users}">
				<td th:text="${user.id}"></td>
				<td th:text="${user.name}"></td>
			</tr>
		</tbody>
	</table>
</body>
</html>
